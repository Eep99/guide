// 全局变量（保留原有功能：跟读、高亮、隐藏等）
let curPage = "shaoshan";
let speed = 1;
let loop = true;
let hideZH = false;
let hideEN = false;
let curLine = 0;
let utter = null;
let isPlaying = false;
let curQuestion = 0; // 题库当前题目索引

// 渲染页面（适配所有类型：导游词、问答、关键词、题库）
function render(){
  let d = data[curPage];
  let html = `<div class='title'>${d.title}</div>`;
  
  // 1. 导游词（中英文逐句对照）
  if(d.type === "dual"){
    html += "<div class='card'>";
    d.lines.forEach((line,i)=>{
      html += `<div class='line ${i===curLine&&isPlaying?"active":""}' onclick='jump(${i})'>
        <div class='zh ${hideZH?"hide":""}'>${line.zh}</div>
        <div class='en ${hideEN?"hide":""}'>${line.en}</div>
      </div>`;
    });
    html += "</div>";
  }

  // 2. 面试问答（50题，可随机抽题）
  else if(d.type === "qa"){
    html += "<div class='card qa'>";
    d.lines.forEach((line,i)=>{
      html += `<p class='${i===curLine&&isPlaying?"active":""}' onclick='jump(${i})'>${line}</p>`;
    });
    html += "</div>";
  }

  // 3. 笔试关键词/词汇（静态HTML）
  else if(d.type === "html"){
    html += d.html;
  }

  // 4. 笔试题库（选择题+判断题，即时反馈）
  else if(d.type === "test"){
    let q = d.questions[curQuestion];
    html += "<div class='card'>";
    html += `<div class='question'>
      <p>${curQuestion+1}/${d.questions.length}：${q.question}</p>
    `;
    // 单选题
    if(q.type === "single"){
      q.options.forEach((opt, idx)=>{
        let optionLetter = String.fromCharCode(65 + idx);
        html += `<div class='option' onclick='checkAnswer("${optionLetter}")'>${optionLetter}. ${opt}</div>`;
      });
    }
    // 判断题
    else if(q.type === "judge"){
      html += `<div class='option' onclick='checkAnswer("正确")'>正确</div>`;
      html += `<div class='option' onclick='checkAnswer("错误")'>错误</div>`;
    }
    // 答案提示（初始隐藏）
    html += `<div class='answer-hint' id='hint' style='display:none'></div>`;
    html += `</div>`;
    // 下一题按钮
    html += `<button class='btn-next' onclick='nextQuestion()'>下一题</button>`;
  }

  document.getElementById("app").innerHTML = html;
}

// 播放功能（保留逐句高亮、跟读）
function play(){
  let d = data[curPage];
  if(!d.lines && d.type !== "dual" && d.type !== "qa"){
    alert("当前页面不支持朗读");
    return;
  }
  stop();
  isPlaying = true;
  render();
  if(d.type === "dual") speakLine(d.lines[curLine].en);
  if(d.type === "qa") speakLine(d.lines[curLine]);
}

function speakLine(text){
  utter = new SpeechSynthesisUtterance(text);
  utter.lang = "en-US";
  utter.rate = speed;
  utter.onend = ()=>{
    curLine++;
    if(curLine >= data[curPage].lines.length){
      curLine = 0;
      if(!loop){
        isPlaying = false;
        render();
        return;
      }
    }
    render();
    play();
  };
  window.speechSynthesis.speak(utter);
}

// 停止播放
function stop(){
  window.speechSynthesis.cancel();
  isPlaying = false;
  curLine = 0;
  render();
}

// 设置语速
function setSpeed(s){
  speed = s;
}

// 切换循环模式
function toggleLoop(){
  loop = !loop;
  alert("循环模式：" + (loop ? "开启" : "关闭"));
}

// 显示/隐藏中文
function toggleZH(){
  hideZH = !hideZH;
  render();
}

// 显示/隐藏英文
function toggleEN(){
  hideEN = !hideEN;
  render();
}

// 跳转到指定句子/题目
function jump(i){
  curLine = i;
  if(isPlaying) play();
  else render();
}

// 随机抽题（面试问答/题库）
function randomQuestion(){
  let d = data[curPage];
  if(d.type === "qa"){
    curLine = Math.floor(Math.random() * d.lines.length);
    render();
  }else if(d.type === "test"){
    curQuestion = Math.floor(Math.random() * d.questions.length);
    render();
  }else{
    alert("当前页面不支持随机抽题");
  }
}

// 题库：检查答案
function checkAnswer(userAnswer){
  let q = data[curPage].questions[curQuestion];
  let options = document.querySelectorAll(".option");
  options.forEach(opt => {
    if(opt.textContent.startsWith(q.answer)){
      opt.classList.add("correct");
    }else if(opt.textContent.startsWith(userAnswer) && userAnswer !== q.answer){
      opt.classList.add("wrong");
    }
  });
  // 显示答案提示
  document.getElementById("hint").style.display = "block";
  document.getElementById("hint").textContent = q.hint;
}

// 题库：下一题
function nextQuestion(){
  let d = data[curPage];
  curQuestion++;
  if(curQuestion >= d.questions.length){
    curQuestion = 0;
    alert("已完成所有题目，重新开始！");
  }
  render();
}

// 菜单切换
document.querySelectorAll(".menu button").forEach(b=>{
  b.addEventListener("click",()=>{
    document.querySelectorAll(".menu button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    curPage = b.dataset.page;
    curLine = 0;
    curQuestion = 0;
    isPlaying = false;
    render();
  });
});

// 初始化页面
render();
</script>
</body>
</html>
