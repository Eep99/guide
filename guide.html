body{background:#f7f8fa;display:flex;height:100vh;overflow:hidden}

shaoshan:`<h1>Shaoshan – Mao Zedong’s Former Residence</h1><div class="card">
<p style="color:#555;margin-bottom:16px">韶山是毛泽东主席的故乡，也是中国红色旅游的圣地，位于湖南湘潭。</p>
<hr>
<p id="en">Dear guests,
Welcome to Shaoshan, the birthplace of Chairman Mao Zedong and the holy land of red tourism in China.

Shaoshan is located in Xiangtan, Hunan. It is famous for Mao Zedong’s Former Residence, which is a typical southern Chinese rural house. Inside, we can see simple furniture and daily items used by his family, showing a hardworking and plain life.

We will also visit the Shaoshan Mao Zedong Memorial Hall, where many precious pictures and cultural relics show his great life and contributions to China.

Shaoshan is not only a place of history, but also a place of spirit. It teaches us to cherish today’s peaceful life and remember the pioneers.

Thank you for listening.</p>
</div>

zhangjiajie:`<h1>Zhangjiajie</h1><div class="card">
<p style="color:#555;margin-bottom:16px">张家界是世界自然遗产，以独特的石英砂岩峰林地貌闻名，也是《阿凡达》灵感来源地。</p>
<hr>
<p id="en">Dear guests,
Today we are going to visit Zhangjiajie, a world-famous scenic spot and a UNESCO World Natural Heritage Site.

Zhangjiajie is known for its unique quartz sandstone peaks. Thousands of tall, steep mountains stand straight into the sky, just like a fairyland on earth. It is so amazing that it even inspired the movie Avatar.

We will visit beautiful places such as Tianmen Mountain with its natural arch, and the quiet Golden Whip Stream. You can enjoy fresh air, green forests and fantastic views here.

Zhangjiajie is also home to the Tujia ethnic group, who have their own special culture, songs and dances.

I believe you will deeply love this magical and beautiful place.</p>
</div>
<button class="copy-btn" onclick="copy()">复制英文导游词</button>`,

hengshan:`<h1>Mount Heng (Southern Sacred Mountain)</h1><div class="card">
<p style="color:#555;margin-bottom:16px">衡山为五岳之一的南岳，位于衡阳，风光秀丽，宗教文化底蕴深厚。</p>
<hr>
<p id="en">Dear guests,
We are now visiting Mount Heng, one of China’s Five Great Mountains, known as the Southern Sacred Mountain. It is located in Hengyang, Hunan.

Mount Heng is famous for its beautiful scenery and profound religious culture. It has a long history of Buddhism and Taoism. Many temples and ancient buildings are hidden among green mountains.

The highest point is Zhurong Peak. From the top, we can enjoy a wonderful view of clouds and mountains around. The climate here is mild, so it is beautiful in all four seasons.

For hundreds of years, many scholars and visitors came here to admire the scenery and pray for blessings.

I hope you enjoy the peaceful and sacred atmosphere of Mount Heng.</p>
</div>
<button class="copy-btn" onclick="copy()">复制英文导游词</button>`,

yueyang:`<h1>Yueyang Tower</h1><div class="card">
<p style="color:#555;margin-bottom:16px">岳阳楼是江南三大名楼之一，临洞庭湖，因范仲淹《岳阳楼记》名扬天下。</p>
<hr>
<p id="en">Dear guests,
Now we are at Yueyang Tower, one of the Three Great Towers along the Yangtze River.

Yueyang Tower has a long history and unique architectural style. It stands by Dongting Lake, with a beautiful view of water and sky.

It is famous for Memorial to Yueyang Tower written by Fan Zhongyan. The most famous sentence is “Be the first to worry about the troubles of the country, and the last to enjoy its happiness”. This spirit has influenced Chinese people for hundreds of years.

Standing here, you can feel the combination of natural scenery and traditional culture.

Thank you.</p>
</div>
<button class="copy-btn" onclick="copy()">复制英文导游词</button>`,

fenghuang:`<h1>Fenghuang Ancient Town</h1><div class="card">
<p style="color:#555;margin-bottom:16px">凤凰古城位于湘西，沱江穿城而过，吊脚楼风貌独特，民族风情浓郁。</p>
<hr>
<p id="en">Dear guests,
Welcome to Fenghuang Ancient Town, a beautiful and peaceful town in western Hunan.

Fenghuang is famous for its well-preserved ancient buildings, clear Tuojiang River and stilted houses. It is a place full of traditional culture of Tujia and Miao ethnic groups.

Walking along the old streets, you can see small bridges, flowing water, local snacks and handicrafts. The town is also connected with the famous writer Shen Congwen, who wrote many beautiful stories about this place.

Fenghuang is like a quiet painting, simple and charming.

I hope you have a pleasant and unforgettable time here.</p>
</div>

let now = "written";
let rate = 1;
let u = null;

function show(){document.getElementById("view").innerHTML=data[now]}
show();

document.querySelectorAll(".menu-list button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".menu-list button").forEach(x=>x.classList.remove("active"))
    b.classList.add("active")
    now = b.dataset.page
    show()
  }
})

function play(){
  window.speechSynthesis.cancel()
  const t = document.getElementById("en")
  if(!t){alert("当前页面无英文朗读内容");return}
  u = new SpeechSynthesisUtterance(t.innerText)
  u.lang="en-US"
  u.rate=rate
  window.speechSynthesis.speak(u)
}

function stop(){window.speechSynthesis.cancel()}
function speed(s){rate=s}
function copy(){
  const t = document.getElementById("en")
  if(!t)return
  navigator.clipboard.writeText(t.innerText).then(()=>alert("复制成功"))
}
</script>
